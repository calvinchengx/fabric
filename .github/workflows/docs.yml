# Build MkDocs site and deploy to GitHub Pages.
# After merge: Repository → Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# Triggers: default branch only + manual. We intentionally do NOT trigger on version tags: the
# `deploy-pages` job uses environment "github-pages", which often has deployment protection
# rules allowing only `main` / `master`. Pushing `v*` then fails the deploy step with
# "environment protection rules" unless you add tag rules under
# Settings → Environments → github-pages → Deployment branches and tags.
#
# Releases: merge release commits to main first; the site updates on that push. To also deploy
# on tags, widen the environment (e.g. allow "v*" tags) and add:  tags: ["v*"]  under `push:`.

name: Deploy documentation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --group docs

      - name: Build MkDocs
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
